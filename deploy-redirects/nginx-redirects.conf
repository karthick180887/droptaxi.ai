# NGINX — drop-taxi alt-form -> canonical 301 redirects
#
# Notes:
# - Rewrite targets use absolute HTTPS URLs so the redirect always lands
#   on HTTPS even if a rogue HTTP request bypasses your TLS-redirect layer.
# - Target host is hardcoded to droptaxi.ai (non-www) because the existing
#   k8s ingress already does www-to-non-www via the
#   `nginx.ingress.kubernetes.io/from-to-www-redirect` annotation.
#
# Option A: Plain NGINX (drop into a `server` block, or `include` it).
#   Example secure server block:
#
#     server {
#       listen 443 ssl http2;
#       server_name droptaxi.ai www.droptaxi.ai;
#       ssl_protocols TLSv1.2 TLSv1.3;
#       ssl_ciphers HIGH:!aNULL:!MD5;
#       ssl_prefer_server_ciphers on;
#       include /etc/nginx/conf.d/nginx-redirects.conf;
#       ...
#     }
#
# Option B: nginx-ingress on Kubernetes — add as an annotation on the
# Ingress object using configuration-snippet (one rewrite per line):
#
#   nginx.ingress.kubernetes.io/configuration-snippet: |
#     rewrite ^/drop-taxi-cuddalore\.html$       https://droptaxi.ai/drop-taxi-in-cuddalore.html       permanent;
#     ... (repeat each line below)

rewrite ^/drop-taxi-cuddalore\.html$       https://droptaxi.ai/drop-taxi-in-cuddalore.html       permanent;
rewrite ^/drop-taxi-erode\.html$           https://droptaxi.ai/drop-taxi-in-erode.html           permanent;
rewrite ^/drop-taxi-hyderabad\.html$       https://droptaxi.ai/drop-taxi-in-hyderabad.html       permanent;
rewrite ^/drop-taxi-madurai\.html$         https://droptaxi.ai/drop-taxi-in-madurai.html         permanent;
rewrite ^/drop-taxi-munnar\.html$          https://droptaxi.ai/drop-taxi-in-munnar.html          permanent;
rewrite ^/drop-taxi-neyveli\.html$         https://droptaxi.ai/drop-taxi-in-neyveli.html         permanent;
rewrite ^/drop-taxi-srirangam\.html$       https://droptaxi.ai/drop-taxi-in-srirangam.html       permanent;
rewrite ^/drop-taxi-thanjavur\.html$       https://droptaxi.ai/drop-taxi-in-thanjavur.html       permanent;
rewrite ^/drop-taxi-tirunelveli\.html$     https://droptaxi.ai/drop-taxi-in-tirunelveli.html     permanent;
rewrite ^/drop-taxi-villupuram\.html$      https://droptaxi.ai/drop-taxi-in-villupuram.html      permanent;
